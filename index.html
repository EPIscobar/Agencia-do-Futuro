<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escobar</title>
</head>
<body>

<div class="site">

    <header>
        <h1>EscoabarTur</h1>
       
    </header>

    <div class="destinos">

        <div class="card">
            <img src="https://images.unsplash.com/photo-1502602898657-3e91760cbb34?w=1000" alt="Paris">
            <div class="info">
                <h2>Paris - França</h2>
                <div class="preco">
                    <p class="economica">Econômica: R$ 4.500</p>
                    <p class="luxo">Luxo: R$ 12.900</p>
                </div>
                <a href="#" class="btn">Reservar</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1540959733332-eab4deabeeaf?w=1000" alt="Tóquio">
            <div class="info">
                <h2>Tóquio - Japão</h2>
                <div class="preco">
                    <p class="economica">Econômica: R$ 7.900</p>
                    <p class="luxo">Luxo: R$ 18.500</p>
                </div>
                <a href="#" class="btn">Reservar</a>
            </div>
        </div>

        <div class="card">
            <img src="https://images.unsplash.com/photo-1499092346589-b9b6be3e94b2?w=1000" alt="Nova York">
            <div class="info">
                <h2>Nova York - EUA</h2>
                <div class="preco">
                    <p class="economica">Econômica: R$ 5.900</p>
                    <p class="luxo">Luxo: R$ 15.700</p>
                </div>
                <a href="#" class="btn">Reservar</a>
            </div>
        </div>

    </div>

</div>

</body>
</html>
